<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>agent-start</title>
    <meta name="description" content="claude code / codex launcher" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <script>
      // Runs before paint so the correct theme class is applied on first paint.
      (() => {
        try {
          var v = localStorage.getItem("agent-start:theme");
          var dark =
            v === "dark" ||
            ((v === null || v === "system") &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <style>
      /* Boot skeleton — replaced by React mount. Mirrors design tokens so it
         visually matches the real shell while data loads. */
      #boot-skeleton {
        display: flex;
        height: 100dvh;
        background: rgb(250 250 250);
        color: rgb(24 24 27);
      }
      .dark #boot-skeleton {
        background: rgb(9 9 11);
        color: rgb(244 244 245);
      }
      #boot-skeleton .bs-side {
        width: 288px;
        border-right: 1px solid rgb(228 228 231);
        padding: 12px;
        flex-shrink: 0;
      }
      .dark #boot-skeleton .bs-side {
        border-color: rgb(39 39 42);
      }
      #boot-skeleton .bs-main {
        flex: 1;
        padding: 16px;
        min-width: 0;
      }
      #boot-skeleton .bs-right {
        width: 320px;
        border-left: 1px solid rgb(228 228 231);
        padding: 16px;
        flex-shrink: 0;
      }
      .dark #boot-skeleton .bs-right {
        border-color: rgb(39 39 42);
      }
      #boot-skeleton .bs-bar {
        background: rgb(244 244 245);
        border-radius: 6px;
        animation: bs-pulse 1.4s ease-in-out infinite;
      }
      .dark #boot-skeleton .bs-bar {
        background: rgb(39 39 42);
      }
      @keyframes bs-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.55;
        }
      }
      @media (max-width: 1023px) {
        #boot-skeleton .bs-right {
          display: none;
        }
      }
      @media (max-width: 767px) {
        #boot-skeleton .bs-side {
          display: none;
        }
      }
    </style>
  </head>
  <body class="min-h-screen bg-app text-fg">
    <div id="root">
      <div id="boot-skeleton" aria-hidden="true">
        <div class="bs-side">
          <div class="bs-bar" style="height: 32px; margin-bottom: 12px"></div>
          <div class="bs-bar" style="height: 28px; margin-bottom: 8px; width: 90%"></div>
          <div class="bs-bar" style="height: 22px; margin-bottom: 6px; width: 75%"></div>
          <div class="bs-bar" style="height: 22px; margin-bottom: 6px; width: 80%"></div>
          <div class="bs-bar" style="height: 22px; margin-bottom: 6px; width: 65%"></div>
          <div class="bs-bar" style="height: 22px; margin-bottom: 6px; width: 78%"></div>
        </div>
        <div class="bs-main">
          <div class="bs-bar" style="height: 40px; margin-bottom: 14px; width: 60%"></div>
          <div class="bs-bar" style="height: 28px; margin-bottom: 10px; width: 40%"></div>
          <div class="bs-bar" style="height: 160px"></div>
        </div>
        <div class="bs-right">
          <div class="bs-bar" style="height: 28px; margin-bottom: 12px; width: 70%"></div>
          <div class="bs-bar" style="height: 20px; margin-bottom: 8px; width: 90%"></div>
          <div class="bs-bar" style="height: 20px; margin-bottom: 8px; width: 80%"></div>
          <div class="bs-bar" style="height: 20px; margin-bottom: 8px; width: 85%"></div>
          <div class="bs-bar" style="height: 120px; margin-top: 14px"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
