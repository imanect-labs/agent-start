[package]
name = "agent-start-host"
version.workspace = true
edition.workspace = true
license.workspace = true
default-run = "agent-start-host"

[[bin]]
name = "agent-start-host"
path = "src/main.rs"

[dependencies]
agent-start-api = { workspace = true }
config-loader  = { workspace = true }
git-ops        = { workspace = true }
pty-manager    = { workspace = true }
code-server-manager = { workspace = true }
state          = { workspace = true }
workspace-manager = { workspace = true }

anyhow = { workspace = true }
axum = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true }
clap = { workspace = true }
futures-util = { workspace = true }
once_cell = { workspace = true }
parking_lot = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
reqwest = { workspace = true, features = ["stream"] }
tokio-tungstenite = "0.24"
futures = "0.3"
mime_guess = "2"
rust-embed = { version = "8", features = ["interpolate-folder-path"] }
