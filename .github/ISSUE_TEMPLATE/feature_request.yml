name: Feature request
description: Suggest an improvement or new capability.
title: "[feat] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do? What's painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like agent-start to behave?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried, or other designs you weighed.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, related issues, etc.
